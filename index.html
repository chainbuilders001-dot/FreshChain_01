<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Gracefully silence benign iframe WebSocket/HMR disconnection warnings
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (String(event.reason).includes('WebSocket') || String(event.reason).includes('websocket') || String(event.reason.message).includes('WebSocket'))) {
          event.preventDefault();
        }
      });
      window.addEventListener('error', function(event) {
        if (event.message && (event.message.includes('WebSocket') || event.message.includes('websocket') || event.message.includes('HMR'))) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
